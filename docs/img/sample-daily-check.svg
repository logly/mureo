<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" role="img" aria-label="mureo /daily-check Meta CV mismatch sample"><style>.t{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:13px;fill:#e6edf3;white-space:pre}.r{fill:#ff6b6b}.g{fill:#7ee787}.y{fill:#ffd866}.c{fill:#79c0ff}.m{fill:#a78bfa}.dim{fill:#9aa0a6}</style><rect width="100%" height="100%" rx="8" ry="8" fill="#0d1117"/><circle cx="20" cy="20" r="6" fill="#ff5f57"/><circle cx="40" cy="20" r="6" fill="#febc2e"/><circle cx="60" cy="20" r="6" fill="#28c840"/><text x="440" y="24" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="11" fill="#9aa0a6">/daily-check — mureo</text><text x="20" y="60" class="t"><tspan class="r">🔴 P0  Meta CV definition mismatch</tspan></text><text x="20" y="92" class="t">Three campaigns, three different "result" units:</text><text x="20" y="120" class="t"><tspan class="dim">  Campaign                    Spend     Results   result_indicator</tspan></text><text x="20" y="138" class="t"><tspan class="dim">  ─────────────────────────────────────────────────────────────────────</tspan></text><text x="20" y="158" class="t">  <tspan class="c">Meta_LP-Traffic</tspan> (active)   ¥33,848   <tspan class="r">0</tspan>       <tspan class="dim">(none — CV not configured)</tspan></text><text x="20" y="178" class="t">  <tspan class="c">Meta_Whitepaper-Lead</tspan>        ¥2,641    <tspan class="g">3</tspan>       <tspan class="g">actions:offsite_conversion.fb_pixel_lead</tspan>  <tspan class="g">← real leads</tspan></text><text x="20" y="198" class="t">  <tspan class="c">Meta_Whitepaper-LinkClick</tspan>   ¥2,592    <tspan class="r">42</tspan>      <tspan class="r">actions:link_click</tspan>                        <tspan class="r">← clicks, not leads</tspan></text><text x="20" y="234" class="t">→ Ads Manager dashboard sums to "<tspan class="r">45 results</tspan>", but only <tspan class="g">3 are real leads</tspan>.</text><text x="20" y="254" class="t">   A budget rebalance driven by the raw "results" column would over-fund</text><text x="20" y="274" class="t">   the link_click campaign by <tspan class="r">14×</tspan>.</text><text x="20" y="306" class="t">→ Fixes:</text><text x="20" y="326" class="t">   1. Switch <tspan class="c">Meta_Whitepaper-LinkClick</tspan> from <tspan class="r">link_click</tspan> → <tspan class="g">Lead (pixel_lead)</tspan>,</text><text x="20" y="346" class="t">      or split into its own campaign.</text><text x="20" y="366" class="t">   2. Verify <tspan class="m">Meta Pixel Lead</tspan> is firing on the LP for <tspan class="c">Meta_LP-Traffic</tspan></text><text x="20" y="386" class="t">      (¥33,848 spent, 0 attributed — likely tracking gap, not creative).</text></svg>
