<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" role="img" aria-label="mureo /daily-check Meta CV 不整合 サンプル"><style>.t{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,"Hiragino Kaku Gothic ProN","Noto Sans JP",monospace;font-size:13px;fill:#e6edf3;white-space:pre}.r{fill:#ff6b6b}.g{fill:#7ee787}.y{fill:#ffd866}.c{fill:#79c0ff}.m{fill:#a78bfa}.dim{fill:#9aa0a6}</style><rect width="100%" height="100%" rx="8" ry="8" fill="#0d1117"/><circle cx="20" cy="20" r="6" fill="#ff5f57"/><circle cx="40" cy="20" r="6" fill="#febc2e"/><circle cx="60" cy="20" r="6" fill="#28c840"/><text x="440" y="24" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="11" fill="#9aa0a6">/daily-check — mureo</text><text x="20" y="60" class="t"><tspan class="r">🔴 P0  Meta CV 定義不整合</tspan></text><text x="20" y="92" class="t">同一アカウントの 3 キャンペーン、3 種類の「結果」単位:</text><text x="20" y="120" class="t"><tspan class="dim">  キャンペーン                    Spend     Results   result_indicator</tspan></text><text x="20" y="138" class="t"><tspan class="dim">  ─────────────────────────────────────────────────────────────────────</tspan></text><text x="20" y="158" class="t">  <tspan class="c">Meta_LP-Traffic</tspan> (active)    ¥33,848   <tspan class="r">0</tspan>       <tspan class="dim">(なし — CV計測未設定)</tspan></text><text x="20" y="178" class="t">  <tspan class="c">Meta_Whitepaper-Lead</tspan>         ¥2,641    <tspan class="g">3</tspan>       <tspan class="g">actions:offsite_conversion.fb_pixel_lead</tspan>  <tspan class="g">← 実リード</tspan></text><text x="20" y="198" class="t">  <tspan class="c">Meta_Whitepaper-LinkClick</tspan>    ¥2,592    <tspan class="r">42</tspan>      <tspan class="r">actions:link_click</tspan>                        <tspan class="r">← クリック、リードではない</tspan></text><text x="20" y="234" class="t">→ ダッシュボード上は「<tspan class="r">45 results</tspan>」と表示されるが、実リードは <tspan class="g">3 件のみ</tspan>。</text><text x="20" y="254" class="t">   「results」列の数値で予算最適化判断をすると、link_click キャンペーンを</text><text x="20" y="274" class="t">   <tspan class="r">14倍</tspan> 過剰予算配分するリスク。</text><text x="20" y="306" class="t">→ 推奨修正:</text><text x="20" y="326" class="t">   1. <tspan class="c">Meta_Whitepaper-LinkClick</tspan> の最適化イベントを <tspan class="r">link_click</tspan> → <tspan class="g">Lead (pixel_lead)</tspan>,</text><text x="20" y="346" class="t">      もしくは別キャンペーンに分離。</text><text x="20" y="366" class="t">   2. <tspan class="c">Meta_LP-Traffic</tspan> の LP に <tspan class="m">Meta Pixel Lead</tspan> が発火しているか確認</text><text x="20" y="386" class="t">      (¥33,848 消化／0 リード — クリエイティブではなく計測欠落の可能性)。</text></svg>
