<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" role="img" aria-label="mureo /search-term-cleanup 出力サンプル"><style>.t{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,"Hiragino Kaku Gothic ProN","Noto Sans JP",monospace;font-size:13px;fill:#e6edf3;white-space:pre}.r{fill:#ff6b6b}.g{fill:#7ee787}.y{fill:#ffd866}.c{fill:#79c0ff}.m{fill:#a78bfa}.dim{fill:#9aa0a6}</style><rect width="100%" height="100%" rx="8" ry="8" fill="#0d1117"/><circle cx="20" cy="20" r="6" fill="#ff5f57"/><circle cx="40" cy="20" r="6" fill="#febc2e"/><circle cx="60" cy="20" r="6" fill="#28c840"/><text x="440" y="24" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="11" fill="#9aa0a6">/search-term-cleanup — mureo</text><text x="20" y="60" class="t"><tspan class="r">🔴 CRITICAL: ブランド自己カニバリゼーション</tspan></text><text x="20" y="92" class="t">同じ検索語 <tspan class="m">&lt;brand&gt;</tspan> が 2 つのキャンペーンで真逆の挙動:</text><text x="20" y="114" class="t">  - <tspan class="c">Search_Brand-Performance</tspan> / Brand 広告グループ : <tspan class="g">6 conv</tspan> / ¥27,300 (CPA ¥4,550) <tspan class="g">✅</tspan></text><text x="20" y="134" class="t">  - <tspan class="c">Search_Lead-Gen          </tspan> / Generic 広告グループ : <tspan class="r">0 conv</tspan> / ¥31,800 (無駄)     <tspan class="r">❌</tspan></text><text x="20" y="154" class="t">  - 同じく <tspan class="m">&lt;brand-en&gt;</tspan> も <tspan class="c">Search_Lead-Gen</tspan> 側     : <tspan class="r">0 conv</tspan> / ¥14,300 (無駄)     <tspan class="r">❌</tspan></text><text x="20" y="186" class="t">→ ブランド流入は <tspan class="c">Search_Brand-Performance</tspan> の Brand 広告グループに集約。</text><text x="20" y="206" class="t">  <tspan class="c">Search_Lead-Gen</tspan> に <tspan class="m">&lt;brand&gt;</tspan> / <tspan class="m">&lt;brand-en&gt;</tspan> をキャンペーン単位の</text><text x="20" y="226" class="t">  除外語として追加。</text><text x="20" y="258" class="t">推定削減効果: <tspan class="g">約 ¥250,000 / 30日</tspan> を低意図トラフィックから再配分可能。</text><text x="20" y="294" class="t"><tspan class="y">⚠️  BYOD は書き込み API 非対応。</tspan>除外語の追加は Google Ads UI で手動実施。</text><text x="20" y="314" class="t">    mureo は STATE.json に <tspan class="dim">observation_due</tspan> 付きで実行計画を記録 →</text><text x="20" y="334" class="t">    次回 /daily-check が結果を評価。</text></svg>
