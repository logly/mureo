<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" role="img" aria-label="mureo /search-term-cleanup output sample"><style>.t{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:13px;fill:#e6edf3;white-space:pre}.r{fill:#ff6b6b}.g{fill:#7ee787}.y{fill:#ffd866}.c{fill:#79c0ff}.m{fill:#a78bfa}.dim{fill:#9aa0a6}</style><rect width="100%" height="100%" rx="8" ry="8" fill="#0d1117"/><circle cx="20" cy="20" r="6" fill="#ff5f57"/><circle cx="40" cy="20" r="6" fill="#febc2e"/><circle cx="60" cy="20" r="6" fill="#28c840"/><text x="440" y="24" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="11" fill="#9aa0a6">/search-term-cleanup — mureo</text><text x="20" y="60" class="t"><tspan class="r">🔴 CRITICAL: Brand self-cannibalization</tspan></text><text x="20" y="92" class="t">Same term <tspan class="m">&lt;brand&gt;</tspan> behaves opposite in two campaigns:</text><text x="20" y="114" class="t">  - <tspan class="c">Search_Brand-Performance</tspan> / Brand ad group  : <tspan class="g">6 conv</tspan> at ¥27,300 (CPA ¥4,550) <tspan class="g">✅</tspan></text><text x="20" y="134" class="t">  - <tspan class="c">Search_Lead-Gen          </tspan> / Generic group   : <tspan class="r">0 conv</tspan> at ¥31,800 (wasted)     <tspan class="r">❌</tspan></text><text x="20" y="154" class="t">  - Same for <tspan class="m">&lt;brand-en&gt;</tspan> in <tspan class="c">Search_Lead-Gen</tspan>     : <tspan class="r">0 conv</tspan> at ¥14,300 (wasted)     <tspan class="r">❌</tspan></text><text x="20" y="186" class="t">→ Brand traffic should consolidate into the Brand ad group of</text><text x="20" y="206" class="t">  <tspan class="c">Search_Brand-Performance</tspan>. Add <tspan class="m">&lt;brand&gt;</tspan> / <tspan class="m">&lt;brand-en&gt;</tspan> as</text><text x="20" y="226" class="t">  campaign-level negatives on <tspan class="c">Search_Lead-Gen</tspan>.</text><text x="20" y="258" class="t">Estimated savings: <tspan class="g">~¥250,000 / 30d</tspan> redirectable from low-intent terms.</text><text x="20" y="294" class="t"><tspan class="y">⚠️  BYOD mode = no write API.</tspan> Negatives must be added in the Google Ads UI;</text><text x="20" y="314" class="t">    mureo logs the plan to STATE.json with <tspan class="dim">observation_due</tspan> for /daily-check</text><text x="20" y="334" class="t">    to evaluate later.</text></svg>
