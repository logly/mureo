name: Security

on:
  schedule:
    - cron: "0 0 * * 1"
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  bandit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: 'pip'
      - name: Install bandit
        run: pip install bandit
      - name: Run bandit scan (report)
        run: bandit -r mureo/ -f json -o bandit-report.json || true
      - name: Run bandit scan (gate)
        run: bandit -r mureo/ -ll -ii
      - name: Upload report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bandit-report
          path: bandit-report.json
