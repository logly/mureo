name: Security

on:
  schedule:
    - cron: "0 0 * * 1"
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  bandit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - name: Install bandit
        run: pip install bandit
      - name: Run bandit scan (report)
        run: bandit -r mureo/ -f json -o bandit-report.json || true
      - name: Run bandit scan (gate)
        run: bandit -r mureo/ -ll -ii
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
